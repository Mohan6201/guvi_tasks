apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: ${CLUSTER_NAME}
  region: ${AWS_DEFAULT_REGION}
  version: "${K8S_VERSION}"

managedNodeGroups:
  - name: ng-1
    instanceType: ${NODE_INSTANCE_TYPE}
    desiredCapacity: ${NODE_DESIRED}
    minSize: ${NODE_MIN}
    maxSize: ${NODE_MAX}
    labels:
      role: worker
    tags:
      Name: ${CLUSTER_NAME}-node

iam:
  withOIDC: true
